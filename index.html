<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h2 { text-align: center; color: #4caf50; letter-spacing: 2px; }
        
        /* فورم إضافة يوزر */
        .add-user-box { background: #111; padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #333; }
        .add-user-box input { background: #000; border: 1px solid #444; color: #fff; padding: 10px; margin: 5px; border-radius: 5px; width: 180px; }
        .btn-add { background: #4caf50; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* الجدول */
        table { width: 100%; border-collapse: collapse; background: #111; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { background: #222; color: #4caf50; }
        tr:hover { background: #1a1a1a; }

        /* أزرار التحكم */
        .status-on { color: #4caf50; font-weight: bold; }
        .status-off { color: #f44336; font-weight: bold; }
        .btn-del { background: #f44336; color: #fff; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        
        /* السويتش (Toggle) */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4caf50; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div class="container">
    <h2>SUPER ADMIN PANEL</h2>

    <div class="add-user-box">
        <h3>Add New Client</h3>
        <input type="text" id="new-id" placeholder="ID (Unique)">
        <input type="text" id="new-user" placeholder="Username">
        <input type="text" id="new-pass" placeholder="Password">
        <button class="btn-add" onclick="addNewUser()">Add User +</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Password</th>
                <th>Status</th>
                <th>Action</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="users-table-body">
            </tbody>
    </table>
</div>

<script>
    const supabaseUrl = 'https://ojiogstdxenhiojvsygp.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qaW9nc3RkeGVuaGlovanZzeWdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTU3MzIsImV4cCI6MjA5MTE3MTczMn0.Tp1i9Mq8OmrcprPLS5KUdzvRWnj4dVQF5o3yxrPymxw';
    const _sb = supabase.createClient(supabaseUrl, supabaseKey);

    window.onload = fetchUsers;

    // جلب كل المستخدمين
    async function fetchUsers() {
        const { data, error } = await _sb.from('nfc_users').select('*').order('id', { ascending: true });
        if (error) return console.error(error);

        const tbody = document.getElementById('users-table-body');
        tbody.innerHTML = '';

        data.forEach(user => {
            // ملاحظة: هنفترض إن Status متخزنة في حقل اسمه 'active' في الداتا بيز (Boolean)
            // لو مش عندك الحقل ده، السوبابيس هيضيفه تلقائي كـ NULL في البداية
            const isActive = user.active !== false; 

            tbody.innerHTML += `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.username}</td>
                    <td>${user.password}</td>
                    <td class="${isActive ? 'status-on' : 'status-off'}">${isActive ? 'Active' : 'Disabled'}</td>
                    <td>
                        <label class="switch">
                            <input type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleUser('${user.id}', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td><button class="btn-del" onclick="deleteUser('${user.id}')">Delete</button></td>
                </tr>
            `;
        });
    }

    // تشغيل أو إيقاف المستخدم
    async function toggleUser(id, isChecking) {
        // لو بيحاول يشغل اليوزر (On) نطلع رسالة التحذير
        if (isChecking) {
            const confirmAction = confirm("⚠️ تحذير: هل أنت متأكد أنك تريد تفعيل هذا المستخدم الآن؟");
            if (!confirmAction) {
                fetchUsers(); // ريفرش عشان نرجع السويتش مكانه لو داس Cancel
                return;
            }
        }

        const { error } = await _sb.from('nfc_users').update({ active: isChecking }).eq('id', id);
        if (error) alert("Error updating status");
        fetchUsers();
    }

    // إضافة يوزر جديد
    async function addNewUser() {
        const id = document.getElementById('new-id').value;
        const user = document.getElementById('new-user').value;
        const pass = document.getElementById('new-pass').value;

        if(!id || !user || !pass) return alert("املا البيانات يا كيمو!");

        const { error } = await _sb.from('nfc_users').insert([{ id, username: user, password: pass, active: true }]);
        if (error) alert("Error adding user: " + error.message);
        else {
            alert("User Added! ✨");
            fetchUsers();
            document.querySelectorAll('.add-user-box input').forEach(i => i.value = '');
        }
    }

    // مسح يوزر
    async function deleteUser(id) {
        if (confirm("أنت بتمسح اليوزر نهائي.. متأكد؟")) {
            const { error } = await _sb.from('nfc_users').delete().eq('id', id);
            if (error) alert("Error deleting");
            fetchUsers();
        }
    }
</script>

</body>
</html>
